services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskmgr
      POSTGRES_PASSWORD: taskmgr_local_dev
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmgr -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://taskmgr:taskmgr_local_dev@db:5432/taskmanager
      SECRET_KEY: ${SECRET_KEY:-change-me-docker-compose-dev-only}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:-change-me-refresh-docker}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500
      USE_ML_PRIORITIZATION: "false"
      ML_MODEL_PATH: backend/ml/model/priority_model.joblib
      APPLICATIONINSIGHTS_CONNECTION_STRING: ""
      RATE_LIMIT_DEFAULT: 120/minute
      RATE_LIMIT_AUTH: 20/minute
      ADMIN_EMAILS: ""
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
